services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    command: npm start
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - my-network
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - 5440:5440
    networks:
      - my-network

volumes:
  my-datavolume:
    driver: local

networks:
  my-network:
    driver: bridge
